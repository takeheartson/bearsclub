<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bear Eating a Bunny</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #87ceeb 0%, #a8d8a8 65%, #5a9e3a 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 1.8rem;
      color: #2d1a00;
      margin-bottom: 24px;
      text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff;
      animation: titleShake 0.15s infinite alternate;
    }
    @keyframes titleShake {
      from { transform: rotate(-1deg) scale(1); }
      to   { transform: rotate(1deg) scale(1.02); }
    }

    .scene {
      position: relative;
      width: 520px;
      height: 380px;
    }

    /* ── SCREAM TEXT ── */
    .scream-container {
      position: absolute;
      top: 20px;
      left: 10px;
      pointer-events: none;
    }
    .scream-word {
      position: absolute;
      font-size: 1.5rem;
      font-weight: 900;
      color: #ff2200;
      text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff;
      white-space: nowrap;
    }
    .scream-word.s1 {
      top: 0; left: 0;
      animation: screamFly1 0.6s infinite ease-out;
    }
    .scream-word.s2 {
      top: 40px; left: -10px;
      animation: screamFly2 0.6s 0.15s infinite ease-out;
    }
    .scream-word.s3 {
      top: 80px; left: 5px;
      animation: screamFly3 0.6s 0.3s infinite ease-out;
    }
    @keyframes screamFly1 {
      0%   { transform: translateX(0)   scale(0.7); opacity: 1; }
      60%  { transform: translateX(-60px) scale(1.2); opacity: 1; }
      100% { transform: translateX(-90px) scale(0.9); opacity: 0; }
    }
    @keyframes screamFly2 {
      0%   { transform: translateX(0)   scale(0.7); opacity: 1; }
      60%  { transform: translateX(-70px) scale(1.3); opacity: 1; }
      100% { transform: translateX(-100px) scale(0.9); opacity: 0; }
    }
    @keyframes screamFly3 {
      0%   { transform: translateX(0)   rotate(0deg) scale(0.7); opacity: 1; }
      60%  { transform: translateX(-55px) rotate(-5deg) scale(1.1); opacity: 1; }
      100% { transform: translateX(-85px) rotate(-8deg) scale(0.9); opacity: 0; }
    }

    /* ── SOUND WAVES ── */
    .waves {
      position: absolute;
      top: 38px;
      left: -10px;
    }
    .wave {
      position: absolute;
      border: 3px solid #ff4400;
      border-radius: 50%;
      opacity: 0;
      animation: wavePulse 0.7s infinite ease-out;
    }
    .wave:nth-child(1) { width: 20px; height: 20px; top: -10px; left: -10px; animation-delay: 0s; }
    .wave:nth-child(2) { width: 36px; height: 36px; top: -18px; left: -18px; animation-delay: 0.15s; }
    .wave:nth-child(3) { width: 54px; height: 54px; top: -27px; left: -27px; animation-delay: 0.3s; }
    @keyframes wavePulse {
      0%   { opacity: 0.9; transform: scale(0.5); }
      100% { opacity: 0;   transform: scale(1.5); }
    }

    /* ── TEARS ── */
    .tear {
      position: absolute;
      width: 7px;
      height: 10px;
      background: #6af;
      border-radius: 50% 50% 60% 60%;
      animation: tearDrop 0.5s infinite ease-in;
    }
    .tear.t1 { top: 120px; left: 100px; animation-delay: 0s; }
    .tear.t2 { top: 115px; left: 90px;  animation-delay: 0.18s; }
    .tear.t3 { top: 110px; left: 108px; animation-delay: 0.33s; }
    @keyframes tearDrop {
      0%   { transform: translateY(0)    scaleY(1);   opacity: 1; }
      80%  { transform: translateY(28px) scaleY(1.3); opacity: 0.8; }
      100% { transform: translateY(40px) scaleY(0.8); opacity: 0; }
    }

    /* ── BEAR ── */
    .bear {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-30%);
      width: 160px;
      animation: bearChomp 0.35s infinite alternate ease-in-out;
    }
    @keyframes bearChomp {
      from { transform: translateX(-30%) rotate(-3deg) scale(1); }
      to   { transform: translateX(-30%) rotate(3deg) scale(1.03); }
    }

    /* Bear body */
    .bear-body {
      width: 130px;
      height: 120px;
      background: #8B4513;
      border-radius: 50% 50% 45% 45%;
      margin: 0 auto;
      position: relative;
      box-shadow: inset -10px -10px 22px rgba(0,0,0,0.35);
    }

    /* Bear belly */
    .bear-belly {
      position: absolute;
      width: 70px;
      height: 70px;
      background: #c47c5a;
      border-radius: 50%;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.6;
    }

    /* Bear arms */
    .bear-arm {
      position: absolute;
      width: 40px;
      height: 65px;
      background: #8B4513;
      border-radius: 40%;
      bottom: 8px;
      box-shadow: inset -4px -4px 10px rgba(0,0,0,0.25);
    }
    .bear-arm.left {
      left: -24px;
      transform-origin: top center;
      animation: armLeft 0.35s infinite alternate ease-in-out;
    }
    .bear-arm.right {
      right: -24px;
      transform-origin: top center;
      animation: armRight 0.35s infinite alternate ease-in-out;
    }
    @keyframes armLeft  { from { transform: rotate(5deg); }  to { transform: rotate(30deg); } }
    @keyframes armRight { from { transform: rotate(-5deg); } to { transform: rotate(-30deg); } }

    /* Claws */
    .bear-claw {
      position: absolute;
      bottom: -4px;
      display: flex;
      gap: 3px;
    }
    .bear-arm.left  .bear-claw { left: 4px; }
    .bear-arm.right .bear-claw { left: 4px; }
    .claw {
      width: 6px;
      height: 10px;
      background: #3a2200;
      border-radius: 50% 50% 60% 60%;
    }

    /* Bear head */
    .bear-head {
      width: 115px;
      height: 105px;
      background: #8B4513;
      border-radius: 50%;
      margin: 0 auto;
      position: relative;
      top: 8px;
      box-shadow: inset -8px -8px 20px rgba(0,0,0,0.28);
    }

    /* Bear ears */
    .bear-ear {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #8B4513;
      border-radius: 50%;
      top: -15px;
      box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2);
    }
    .bear-ear::after {
      content: '';
      width: 20px; height: 20px;
      background: #c47c5a;
      border-radius: 50%;
      position: absolute;
      top: 7px; left: 8px;
    }
    .bear-ear.left  { left: 5px; }
    .bear-ear.right { right: 5px; }

    /* Bear eyes – happy eating squint */
    .bear-eye {
      position: absolute;
      width: 16px;
      height: 10px;
      background: #111;
      border-radius: 0 0 50% 50%;
      top: 30px;
      overflow: hidden;
    }
    .bear-eye::after {
      content: '';
      width: 5px; height: 5px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 3px;
    }
    .bear-eye.left  { left: 22px; }
    .bear-eye.right { right: 22px; }

    /* Bear cheeks – happy blush */
    .bear-cheek {
      position: absolute;
      width: 22px;
      height: 14px;
      background: rgba(255,120,80,0.35);
      border-radius: 50%;
      top: 46px;
    }
    .bear-cheek.left  { left: 10px; }
    .bear-cheek.right { right: 10px; }

    /* Bear snout */
    .bear-snout {
      position: absolute;
      width: 52px;
      height: 38px;
      background: #c47c5a;
      border-radius: 50%;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Bear nose */
    .bear-nose {
      position: absolute;
      width: 18px; height: 11px;
      background: #2d1a00;
      border-radius: 50%;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Bear mouth – big chomping */
    .bear-mouth {
      position: absolute;
      width: 34px;
      height: 0;
      background: #1a0a00;
      border-radius: 0 0 50% 50%;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      animation: bigChomp 0.35s infinite alternate ease-in-out;
      overflow: visible;
    }
    @keyframes bigChomp {
      from { height: 4px; }
      to   { height: 20px; }
    }

    /* Bear teeth */
    .bear-teeth {
      position: absolute;
      top: 0; left: 2px;
      display: flex; gap: 3px;
    }
    .tooth {
      width: 7px; height: 8px;
      background: #fffde0;
      border-radius: 0 0 4px 4px;
    }

    /* ── BUNNY (sticking out of mouth) ── */
    .bunny-wrapper {
      position: absolute;
      /* sits just above the bear snout area */
      bottom: 52px;
      left: 50%;
      transform: translateX(-58px);
      z-index: 10;
    }

    .bunny {
      animation: bunnyShake 0.1s infinite linear;
      position: relative;
    }
    @keyframes bunnyShake {
      0%   { transform: translate(0, 0) rotate(-4deg); }
      25%  { transform: translate(2px, -1px) rotate(4deg); }
      50%  { transform: translate(-2px, 1px) rotate(-4deg); }
      75%  { transform: translate(1px, -2px) rotate(3deg); }
      100% { transform: translate(-1px, 0) rotate(-4deg); }
    }

    /* Bunny ears – flailing */
    .bunny-ears {
      display: flex;
      justify-content: center;
      gap: 4px;
    }
    .bunny-ear {
      width: 13px;
      height: 32px;
      background: #f0e0e0;
      border-radius: 50% 50% 0 0;
      position: relative;
    }
    .bunny-ear::after {
      content: '';
      width: 7px; height: 22px;
      background: #ffb6c1;
      border-radius: 50%;
      position: absolute;
      top: 4px; left: 3px;
    }
    .bunny-ear.left  { animation: earLeft  0.2s infinite alternate ease-in-out; transform-origin: bottom center; }
    .bunny-ear.right { animation: earRight 0.2s infinite alternate ease-in-out; transform-origin: bottom center; }
    @keyframes earLeft  { from { transform: rotate(-25deg); } to { transform: rotate(5deg); } }
    @keyframes earRight { from { transform: rotate(5deg);  } to { transform: rotate(25deg); } }

    /* Bunny head */
    .bunny-head {
      width: 38px;
      height: 34px;
      background: #f0e0e0;
      border-radius: 50%;
      margin: 0 auto;
      position: relative;
      box-shadow: inset -3px -3px 8px rgba(0,0,0,0.12);
    }

    /* Bunny eyes – wide panic spirals */
    .bunny-eye {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      top: 7px;
      border: 1.5px solid #ccc;
      overflow: hidden;
    }
    .bunny-eye::before {
      content: '';
      width: 6px; height: 6px;
      background: #e00;
      border-radius: 50%;
      position: absolute;
      top: 1px; left: 1px;
      animation: eyePanic 0.2s infinite alternate;
    }
    .bunny-eye::after {
      content: '';
      width: 3px; height: 3px;
      background: #000;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      animation: eyePanic 0.2s infinite alternate;
    }
    @keyframes eyePanic {
      from { transform: translate(0, 0); }
      to   { transform: translate(1px, -1px); }
    }
    .bunny-eye.left  { left: 4px; }
    .bunny-eye.right { right: 4px; }

    /* Bunny scream mouth – wide open O */
    .bunny-mouth {
      position: absolute;
      width: 14px;
      height: 0;
      background: #800000;
      border-radius: 50%;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid #500000;
      animation: screamMouth 0.15s infinite alternate ease-in-out;
      overflow: hidden;
    }
    @keyframes screamMouth {
      from { height: 10px; width: 12px; }
      to   { height: 16px; width: 16px; }
    }

    /* Tongue inside mouth */
    .bunny-tongue {
      position: absolute;
      width: 10px; height: 8px;
      background: #ff6b6b;
      border-radius: 0 0 50% 50%;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      animation: tonguePanic 0.2s infinite alternate;
    }
    @keyframes tonguePanic {
      from { transform: translateX(-50%) scaleY(0.8); }
      to   { transform: translateX(-50%) scaleY(1.2); }
    }

    /* ── CHEESE HAT ── */
    .cheese {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      animation: cheeseTilt 0.35s infinite alternate ease-in-out;
    }
    @keyframes cheeseTilt {
      from { transform: translateX(-50%) rotate(-8deg) translateY(0); }
      to   { transform: translateX(-50%) rotate(8deg) translateY(-3px); }
    }

    .cheese-block {
      width: 86px;
      height: 50px;
      background: #f5c518;
      position: relative;
      clip-path: polygon(0% 100%, 0% 35%, 22% 0%, 100% 0%, 100% 100%);
      box-shadow: inset -6px -6px 14px rgba(0,0,0,0.18);
    }

    /* Cheese shine */
    .cheese-block::before {
      content: '';
      position: absolute;
      top: 6px; left: 26px;
      width: 18px; height: 8px;
      background: rgba(255,255,200,0.5);
      border-radius: 50%;
      transform: rotate(-20deg);
    }

    .cheese-hole {
      position: absolute;
      background: #c8920a;
      border-radius: 50%;
      box-shadow: inset 2px 2px 5px rgba(0,0,0,0.25);
    }
    .cheese-hole.h1 { width: 16px; height: 13px; top: 18px; left: 14px; }
    .cheese-hole.h2 { width: 11px; height: 10px; top: 10px; left: 46px; }
    .cheese-hole.h3 { width: 9px;  height: 8px;  top: 28px; left: 60px; }

    .cheese-base {
      width: 96px;
      height: 9px;
      background: #c8920a;
      border-radius: 0 0 4px 4px;
      margin: 0 auto;
    }

    /* ── DECORATIVE EFFECTS ── */
    .effect {
      position: absolute;
      font-size: 1.6rem;
      pointer-events: none;
      animation: spinPulse 0.9s linear infinite;
    }
    .effect.e1 { top: 50px;  left: 20px;  animation-duration: 0.7s; }
    .effect.e2 { top: 10px;  right: 15px; animation-direction: reverse; }
    .effect.e3 { bottom: 60px; right: 5px; animation-duration: 0.55s; }
    @keyframes spinPulse {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(180deg) scale(1.4); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Ground */
    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 30px;
      background: #5a9e3a;
      border-radius: 50% 50% 0 0 / 20px 20px 0 0;
    }

    /* Grass blades */
    .grass-blade {
      position: absolute;
      bottom: 26px;
      width: 6px;
      background: #4a8a2a;
      border-radius: 50% 50% 0 0;
      transform-origin: bottom center;
      animation: grassSway 0.8s infinite alternate ease-in-out;
    }

    footer {
      margin-top: 18px;
      color: #2d1a00;
      font-size: 0.9rem;
      opacity: 0.8;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>

  <h1>NOM NOM NOM...</h1>

  <div class="scene">

    <!-- Ground -->
    <div class="ground"></div>

    <!-- Grass blades -->
    <div class="grass-blade" style="left:30px;  height:18px; animation-delay:0.0s;"></div>
    <div class="grass-blade" style="left:50px;  height:22px; animation-delay:0.1s;"></div>
    <div class="grass-blade" style="left:70px;  height:15px; animation-delay:0.3s;"></div>
    <div class="grass-blade" style="left:300px; height:20px; animation-delay:0.2s;"></div>
    <div class="grass-blade" style="left:330px; height:16px; animation-delay:0.4s;"></div>
    <div class="grass-blade" style="left:360px; height:24px; animation-delay:0.1s;"></div>
    <div class="grass-blade" style="left:390px; height:18px; animation-delay:0.5s;"></div>

    <!-- Spinning star effects -->
    <div class="effect e1">✦</div>
    <div class="effect e2">✦</div>
    <div class="effect e3">✦</div>

    <!-- Tears flying off bunny -->
    <div class="tear t1"></div>
    <div class="tear t2"></div>
    <div class="tear t3"></div>

    <!-- Sound waves from scream -->
    <div class="waves">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>

    <!-- Scream text shooting out -->
    <div class="scream-container">
      <div class="scream-word s1">AAAA!!</div>
      <div class="scream-word s2">NOOO!!</div>
      <div class="scream-word s3">HELP!!</div>
    </div>

    <!-- Bear -->
    <div class="bear">

      <div class="bear-head">
        <div class="bear-ear left"></div>
        <div class="bear-ear right"></div>
        <div class="bear-eye left"></div>
        <div class="bear-eye right"></div>
        <div class="bear-cheek left"></div>
        <div class="bear-cheek right"></div>

        <!-- Bunny sticking out of snout area -->
        <div class="bunny-wrapper">
          <div class="bunny">
            <div class="bunny-ears">
              <div class="bunny-ear left"></div>
              <div class="bunny-ear right"></div>
            </div>
            <div class="bunny-head">
              <div class="bunny-eye left"></div>
              <div class="bunny-eye right"></div>
              <div class="bunny-mouth">
                <div class="bunny-tongue"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="bear-snout">
          <div class="bear-nose"></div>
          <div class="bear-mouth">
            <div class="bear-teeth">
              <div class="tooth"></div>
              <div class="tooth"></div>
              <div class="tooth"></div>
            </div>
          </div>
        </div>

        <!-- Cheese hat -->
        <div class="cheese">
          <div class="cheese-block">
            <div class="cheese-hole h1"></div>
            <div class="cheese-hole h2"></div>
            <div class="cheese-hole h3"></div>
          </div>
          <div class="cheese-base"></div>
        </div>

      </div><!-- /bear-head -->

      <div class="bear-body">
        <div class="bear-belly"></div>
        <div class="bear-arm left">
          <div class="bear-claw">
            <div class="claw"></div><div class="claw"></div><div class="claw"></div>
          </div>
        </div>
        <div class="bear-arm right">
          <div class="bear-claw">
            <div class="claw"></div><div class="claw"></div><div class="claw"></div>
          </div>
        </div>
      </div>

    </div><!-- /bear -->

  </div><!-- /scene -->

  <footer>The bear is having a great day. The bunny is not.</footer>

</body>
</html>
